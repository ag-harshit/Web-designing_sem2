<!DOCTYPE html>
<html>
<head>
<title>Employee Salary Management</title>
<style>
body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
}

.container{
width:350px;
margin:50px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
display:block;
width:90%;
margin:10px auto;
padding:8px;
}

button{
margin:5px;
padding:8px 12px;
background:green;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

#output{
margin-top:20px;
text-align:left;
}
</style>
</head>

<body>

<div class="container">

<h2>Employee Salary Management System</h2>

<input type="text" id="name" placeholder="Employee Name">
<input type="text" id="id" placeholder="Employee ID">
<input type="number" id="salary" placeholder="Salary">
<input type="text" id="dept" placeholder="Department">

<button onclick="addEmployee()">Add Employee</button>

<br>

<button onclick="displayAll()">Display All</button>
<button onclick="salaryAbove()">Salary > 50000</button>
<button onclick="totalSalary()">Total Salary</button>
<button onclick="averageSalary()">Average Salary</button>
<button onclick="countDepartment()">Count by Department</button>

<div id="output"></div>

</div>

<script src="script.js"></script>

</body>
</html>
